version: "3.8"
services:
  infra-postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: "REPLACE_DB_PASSWORD"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 30s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:21.1.1
    restart: unless-stopped
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://infra-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: "REPLACE_DB_PASSWORD"
      KC_HOSTNAME: auth.ckc.dev.2u.hk
      KC_PROXY: edge
      KC_HOSTNAME_STRICT_HTTPS: "true"
    depends_on:
      infra-postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  caddy:
    image: caddy:2.7.5
    restart: unless-stopped
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
  caddy_data:
  caddy_config:
